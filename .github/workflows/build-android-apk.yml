name: Build Mobile IPA

on:
  push:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Create or update a GitHub release with the built APK and IPA"
        required: false
        default: false
        type: boolean
      release_tag:
        description: "Release tag to publish when publish_release is enabled"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: build-mobile-artifacts-${{ github.ref }}
  cancel-in-progress: true

env:
  MOBILE_API_BASE_URL: https://core.wspace.sbs

jobs:
  build-android-apk:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Firebase config secret
        env:
          ANDROID_GOOGLE_SERVICES_JSON: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "${ANDROID_GOOGLE_SERVICES_JSON}" ]; then
            echo "Missing secret: ANDROID_GOOGLE_SERVICES_JSON" >&2
            echo "Add the raw contents of android/app/google-services.json as a repository secret." >&2
            exit 1
          fi

      - name: Write google-services.json
        env:
          ANDROID_GOOGLE_SERVICES_JSON: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}
        run: |
          printf '%s' "${ANDROID_GOOGLE_SERVICES_JSON}" > android/app/google-services.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release --dart-define=MOBILE_API_BASE_URL="${MOBILE_API_BASE_URL}"
          cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/accord.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: accord-apk
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/accord.apk
          if-no-files-found: error

  build-ios-ipa:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write GoogleService-Info.plist when available
        env:
          IOS_GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          if [ -n "${IOS_GOOGLE_SERVICE_INFO_PLIST}" ]; then
            printf '%s' "${IOS_GOOGLE_SERVICE_INFO_PLIST}" > ios/Runner/GoogleService-Info.plist
          else
            echo "IOS_GOOGLE_SERVICE_INFO_PLIST is not set; continuing without it."
          fi

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS app without codesign
        run: flutter build ios --release --no-codesign --dart-define=MOBILE_API_BASE_URL="${MOBILE_API_BASE_URL}"

      - name: Create unsigned IPA artifact
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r accord-ios-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: accord-ios-ipa
          path: build/ios/ipa/accord-ios-unsigned.ipa
          if-no-files-found: error

  publish-release:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true' && github.event.inputs.release_tag != '' }}
    needs:
      - build-android-apk
      - build-ios-ipa
    runs-on: ubuntu-latest

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: accord-apk
          path: artifacts/apk

      - name: Download IPA artifact
        uses: actions/download-artifact@v4
        with:
          name: accord-ios-ipa
          path: artifacts/ipa

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ github.event.inputs.release_tag }}
          files: |
            artifacts/apk/app-release.apk
            artifacts/apk/accord.apk
            artifacts/ipa/accord-ios-unsigned.ipa
